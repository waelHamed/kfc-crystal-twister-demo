<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>KFC x Crystal - KSA2</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;overflow:hidden;width:100vw;height:100vh;font-family:'Inter',sans-serif;color:#fff;touch-action:none;user-select:none;cursor:pointer}
.ad-badge{position:fixed;top:12px;left:12px;z-index:100;background:rgba(255,255,255,.12);backdrop-filter:blur(8px);padding:4px 12px;border-radius:4px;font-size:11px;font-weight:600;color:rgba(255,255,255,.6);letter-spacing:1px}
.close-btn{position:fixed;top:12px;right:12px;z-index:100;width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;color:rgba(255,255,255,.5);transition:transform .3s,background .2s;backdrop-filter:blur(8px)}
.close-btn:hover{background:rgba(255,255,255,.2);transform:rotate(90deg)}
.kfc-stripes{position:fixed;top:0;left:50%;transform:translateX(-50%);display:flex;gap:5px;z-index:90}
.kfc-stripes i{display:block;width:18px;height:24px;background:#E4002B;border-radius:0 0 3px 3px}
.frame{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .6s ease;z-index:10}
.frame.active{opacity:1;pointer-events:all}
#f1{background:#0a0a0a}
#f1 img{width:90%;max-width:360px;border-radius:8px;box-shadow:0 0 40px rgba(228,0,43,.2)}
.swipe-cta{margin-top:24px;font-size:15px;color:rgba(255,255,255,.5);text-align:center;animation:bob 2s ease-in-out infinite}
.swipe-cta .arrow{display:block;font-size:28px;margin-top:6px;animation:arrowBounce 1.5s ease-in-out infinite}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(6px)}}
@keyframes arrowBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(10px)}}
#f2{background:#0a0a0a;z-index:20}
#f2 img{width:90%;max-width:360px;height:auto;object-fit:contain;border-radius:8px;box-shadow:0 0 50px rgba(200,16,46,.3)}
.drip{position:fixed;background:#C8102E;border-radius:50% 50% 50% 50%/60% 60% 40% 40%;z-index:16;pointer-events:none;box-shadow:0 0 6px rgba(200,16,46,.5)}
#f3{background:#0a0a0a;z-index:30}
#f3 .product-img{width:92%;max-width:370px;border-radius:10px;box-shadow:0 20px 60px rgba(0,0,0,.5);transform:scale(.8);opacity:0;transition:transform .8s cubic-bezier(.16,1,.3,1),opacity .6s ease}
#f3.active .product-img{transform:scale(1);opacity:1}
#f4{background:rgba(0,0,0,.92);backdrop-filter:blur(20px);z-index:40;padding:20px;overflow-y:auto;-webkit-overflow-scrolling:touch}
.ri{opacity:0;transform:translateY(24px);transition:opacity .7s cubic-bezier(.16,1,.3,1),transform .7s cubic-bezier(.16,1,.3,1)}
.ri.in{opacity:1;transform:translateY(0)}
.r-img{width:88%;max-width:340px;border-radius:12px;box-shadow:0 16px 50px rgba(0,0,0,.5);margin-bottom:16px}
.r-cta{display:inline-block;background:#E4002B;color:#fff;padding:13px 44px;border-radius:50px;font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;border:none;cursor:pointer;box-shadow:0 4px 20px rgba(228,0,43,.4);transition:transform .15s;text-decoration:none}
.r-cta:hover{transform:translateY(-2px)}
.r-replay{margin-top:12px;font-size:12px;color:rgba(255,255,255,.3);cursor:pointer;background:none;border:none;font-family:inherit}
.r-mark{position:absolute;bottom:14px;font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:3px;color:rgba(255,255,255,.06)}
@media(max-height:700px){.r-img{max-width:280px}.r-cta{padding:10px 36px;font-size:18px}}
@media(max-height:560px){.r-img{max-width:240px}.r-cta{padding:10px 36px;font-size:16px}}
</style>
</head>

  <div class="ri" data-d="2"><button class="r-replay" onclick="replay()">&#8635; Replay</button></div>
  <div class="r-mark">KFC</div>
</div>

<script>
var state='intro',startY=0,swiping=false,dripTimer=null;

function showFrame(id){
  document.querySelectorAll('.frame').forEach(function(f){f.classList.remove('active')});
  document.getElementById(id).classList.add('active');
}

function advance(){
  if(state==='intro'){triggerSauceDrip();return}
}

document.addEventListener('touchstart',function(e){
  if(state!=='intro')return;startY=e.touches[0].clientY;swiping=true;
},{passive:true});
document.addEventListener('touchmove',function(e){
  if(!swiping||state!=='intro')return;
  if(e.touches[0].clientY-startY>40){swiping=false;triggerSauceDrip();}
},{passive:true});
document.addEventListener('touchend',function(){swiping=false},{passive:true});

document.addEventListener('mousedown',function(e){
  if(state!=='intro')return;startY=e.clientY;swiping=true;
});
document.addEventListener('mousemove',function(e){
  if(!swiping||state!=='intro')return;
  if(e.clientY-startY>40){swiping=false;triggerSauceDrip();}
});
document.addEventListener('mouseup',function(){swiping=false});

document.addEventListener('click',function(e){
  if(e.target.closest('.close-btn')||e.target.closest('.r-cta')||e.target.closest('.r-replay'))return;
  advance();
});

function triggerSauceDrip(){
  state='sauce_drip';
  var count=0;
  dripTimer=setInterval(function(){
    for(var i=0;i<4;i++)createDrip();
    count++;
    if(count>20){
      clearInterval(dripTimer);
      showFrame('f2');
      setTimeout(function(){
        state='product';
        showFrame('f3');
        setTimeout(function(){
          state='reveal';
          showFrame('f4');
          document.querySelectorAll('#f4 .ri').forEach(function(el){
            var d=parseInt(el.getAttribute('data-d'))||0;
            setTimeout(function(){el.classList.add('in')},200+d*180);
          });
        },2200);
      },1800);
    }
  },70);
}

function createDrip(){
  var d=document.createElement('div');
  d.className='drip';
  var w=6+Math.random()*16;
  d.style.width=w+'px';
  d.style.height=w*(1.2+Math.random()*0.8)+'px';
  d.style.left=Math.random()*100+'vw';
  d.style.top='-20px';
  d.style.opacity='0.75';
  var r=170+Math.random()*50,g=10+Math.random()*30,b=5+Math.random()*20;
  d.style.background='rgb('+Math.round(r)+','+Math.round(g)+','+Math.round(b)+')';
  document.body.appendChild(d);
  var speed=3+Math.random()*6,y=-20,wobble=Math.random()*6.28;
  function fall(){
    y+=speed;wobble+=0.03;
    d.style.top=y+'px';
    d.style.transform='translateX('+Math.sin(wobble)*3+'px)';
    if(y<window.innerHeight+40)requestAnimationFrame(fall);
    else d.remove();
  }
  requestAnimationFrame(fall);
}

function closeAd(){document.body.style.opacity='0';document.body.style.transition='opacity .4s'}
function replay(){
  document.querySelectorAll('.drip').forEach(function(d){d.remove()});
  document.querySelectorAll('#f4 .ri').forEach(function(el){el.classList.remove('in')});
  state='intro';showFrame('f1');
}
</script>
